<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Pet Paws Journey Admin Login — Authorized personnel only.">
  <title>Admin Login — Pet Paws Journey</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="login-page">
    <div class="login-card">
      <a href="index.html" class="logo">
        <svg viewBox="0 0 36 36" fill="currentColor"><ellipse cx="10" cy="8" rx="3.5" ry="4.5"/><ellipse cx="26" cy="8" rx="3.5" ry="4.5"/><ellipse cx="5" cy="19" rx="3" ry="3.5"/><ellipse cx="31" cy="19" rx="3" ry="3.5"/><path d="M18 34c-5 0-8-3.5-8-7.5 0-3 3.5-6 8-6s8 3 8 6c0 4-3 7.5-8 7.5z"/></svg>
        Pet<span>Paws</span>
      </a>
      <h2>Admin Dashboard</h2>
      <p>Sign in to manage shipments and tracking updates.</p>

      <div class="login-error" id="loginError"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" placeholder="admin@petpawsjourney.com" required>
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn btn-primary btn-lg" id="loginBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10,17 15,12 10,7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Sign In
        </button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    // Admin login handler
    document.addEventListener('DOMContentLoaded', async () => {
      // Check if already logged in
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        window.location.href = 'admin-dashboard.html';
        return;
      }

      const form = document.getElementById('loginForm');
      const errorEl = document.getElementById('loginError');
      const loginBtn = document.getElementById('loginBtn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.classList.remove('visible');

        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;

        loginBtn.disabled = true;
        loginBtn.textContent = 'Signing in...';

        try {
          const { data, error } = await supabaseClient.auth.signInWithPassword({
            email,
            password
          });

          if (error) throw error;

          // Redirect to dashboard
          window.location.href = 'admin-dashboard.html';

        } catch (err) {
          errorEl.textContent = err.message || 'Invalid credentials. Please try again.';
          errorEl.classList.add('visible');
          loginBtn.disabled = false;
          loginBtn.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10,17 15,12 10,7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            Sign In
          `;
        }
      });
    });
  </script>
</body>
</html>
